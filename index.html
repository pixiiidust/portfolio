<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jamie Sim | Product Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=VT323&display=swap" rel="stylesheet">
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License - https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <style>
      :root {
        --bg-color: #FFFFFF;
        --text-color: #000000;
        --border-color: #000000;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background-color: #f0f0f0; /* Light gray background for the "desk" */
        font-family: 'JetBrains Mono', monospace;
        color: var(--text-color);
        display: flex;
        justify-content: center;
        min-height: 100vh;
        padding: 0;
        font-size: 16px;
        overflow-x: hidden;
      }
      @media (min-width: 1024px) {
        body {
            padding: 2rem;
        }
      }
      .font-pixel {
        font-family: 'VT323', monospace;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: white;
        border-left: 2px solid black;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: black;
      }
      .clip-triangle {
        clip-path: polygon(0 0, 100% 0, 100% 100%);
      }
      :focus-visible {
        outline: 3px solid #000;
        outline-offset: 3px;
      }
    </style>
</head>
  <body>
    <div id="root" class="w-full max-w-[1400px]"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
